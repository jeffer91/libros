# =========================================================
# Nombre completo: release.yml
# Ruta o ubicación: /.github/workflows/release.yml
#
# Función:
# 1. Ejecutarse cuando se sube un tag de version v*.
# 2. Instalar dependencias.
# 3. Crear instalador Windows con electron-builder.
# 4. Publicar automaticamente en GitHub Releases.
# 5. Generar metadata necesaria para auto-update.
#
# Con qué se conecta:
# - package.json
# - electron-builder
# - electron-updater
# - GitHub Releases
#
# Para qué sirve:
# Automatiza la publicacion de versiones instalables.
# =========================================================

name: Crear instalador y publicar version

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Crear instalador Windows
    runs-on: windows-latest

    steps:
      - name: Descargar codigo del repositorio
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm install

      - name: Crear instalador y publicar en GitHub Releases
        run: npm run dist:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}